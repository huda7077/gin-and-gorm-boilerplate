<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Reset Password</title>
  </head>
  <body
    style="
      font-family: Arial, Helvetica, sans-serif;
      background-color: #ffffff;
      color: #111827;
      font-size: 16px;
      line-height: 1.5;
      padding: 20px;
    "
  >
    <p>Hello,</p>
    <p>We received a request to reset your password. Please use the following OTP code:</p>
    <p
      style="
        font-size: 24px;
        font-weight: bold;
        letter-spacing: 4px;
        color: #dc2626;
      "
    >
      {{.OTP}}
    </p>
    <p>This code is valid for {{.ExpiredMinutes}} minutes.</p>
    <p>If you didn't request a password reset, please ignore this email.</p>
    <p>Thank you 🙏</p>
  </body>
</html>
