# nixpacks.toml — Coolify deployment configuration

[phases.setup]
# Ensure Go, make, and atlas are available in the build environment
nixPkgs = ["go","gnumake","atlas"]
# Upgrade atlas into latest
cmds = ["curl -sSf https://atlasgo.sh | sh"]

[phases.install]
# Installing all go.mod depedencies
cmds = ["go mod download"]

[phases.build]
# Build the binary using Makefile
cmds = ["make build", "make migrate-apply"]
dependsOn =["install"]

[start]
# Run the pre-built binary (produced by `make build` → ./tmp/main)
cmd = "./tmp/main"
dependsOn =["build"]
